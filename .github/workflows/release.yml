name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: promptkey/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build
        working-directory: promptkey
        run: wails build -platform windows/amd64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: promptkey/build/bin/promptkey.exe
          generate_release_notes: true
